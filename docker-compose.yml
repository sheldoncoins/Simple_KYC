# Local dev stack: Postgres + Redis + the API + the background worker.
#   docker compose up --build
# The API waits for Postgres, runs `alembic upgrade head`, then serves on
# http://localhost:8000 (docs at /docs). Biometric decisions are dispatched to
# the arq worker via Redis (KYC_TASK_QUEUE=arq); the client polls session status.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: kyc
      POSTGRES_DB: kyc
    ports:
      - "5432:5432"
    volumes:
      - kyc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc -d kyc"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      KYC_DATABASE_URL: postgresql+psycopg://kyc:kyc@db:5432/kyc
      KYC_REDIS_URL: redis://redis:6379
      KYC_TASK_QUEUE: arq
      KYC_LOG_FORMAT: console
      # Override these per-deployment; defaults here are dev-only.
      KYC_PII_SALT: dev-pii-salt-change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      KYC_DATABASE_URL: postgresql+psycopg://kyc:kyc@db:5432/kyc
      KYC_REDIS_URL: redis://redis:6379
      KYC_LOG_FORMAT: console
      KYC_PII_SALT: dev-pii-salt-change-me
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        # Baked into the client bundle at build time (browser -> API).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api

volumes:
  kyc_pgdata:
