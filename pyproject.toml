# Tooling configuration for the KYC verification server.
#
# This file is intentionally config-only (no [build-system]/[project]): the app
# is run from a checkout via `requirements.txt`, not installed as a wheel. Tools
# (ruff, mypy, pytest) discover their settings here.

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["app", "tests"]
# Alembic owns this directory: env.py uses a deliberate post-config side-effect
# import and the version files are autogenerated.
extend-exclude = ["migrations"]

[tool.ruff.lint]
# Pragmatic, high-signal set: pycodestyle (E/W), pyflakes (F), import sorting (I).
# E501 is delegated to the formatter. Opinionated rule families (B, UP) are left
# for a later ratchet so this hygiene phase doesn't rewrite working code.
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
# run_demo.py bootstraps sys.path before importing the app package on purpose.
"run_demo.py" = ["E402"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
files = ["app", "run_demo.py"]
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]

# Optional production-only deps, lazily imported inside provider seams.
[[tool.mypy.overrides]]
module = ["boto3", "passporteye"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
# Run the suite without an editable install: `app` imports resolve from the root.
pythonpath = ["."]
addopts = "-q"
