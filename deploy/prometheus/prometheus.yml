# Prometheus scrape config for the KYC API. The compose service mounts this and
# alerts.yml. In k8s, scrape via the pod annotations on the api Deployment.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: kyc-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
